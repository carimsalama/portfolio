<div class="projects-section">
  <div class="container">

    <h2>Recent <span>Projects</span></h2>
    <p>Showcasing real-world applications built with modern technologies.</p>

    <div class="projects-grid">
      <div class="project-card" *ngFor="let project of projects">
        <img [src]="project.image" [alt]="project.title">

        <div class="project-body">
          <div class="tags">
            <span *ngFor="let tech of project.tech">{{ tech }}</span>
          </div>

          <h3>{{ project.title }}</h3>
          <p>{{ project.description }}</p>

          <div class="project-links">
            <a *ngIf="project.liveDemo" [href]="project.liveDemo" target="_blank">Live Demo</a>
            <a *ngIf="project.sourceCode" [href]="project.sourceCode" target="_blank">Source Code</a>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>
