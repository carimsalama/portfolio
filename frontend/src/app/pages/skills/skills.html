<div class="skills-section container" *ngIf="skillsData">
  <h2>Technical <span>Skills</span></h2>
  <p>A comprehensive toolkit for building scalable applications.</p>

  <div class="skills-grid">

    <div class="skill-card" *ngFor="let skill of skillsData">

      <h3>{{ skill.category }}</h3>

      <ul>
        <li *ngFor="let item of skill.items">
          {{ item }}
        </li>
      </ul>

    </div>

  </div>
</div>
