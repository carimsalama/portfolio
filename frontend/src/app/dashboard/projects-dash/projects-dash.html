<section class="panel" >
  <form action="#" method="post" (ngSubmit)="onUpdate()" [formGroup]= "projectsForm">

  <h3>Projects</h3>

  <div class="project-form">
    <input type="text" formControlName="title" placeholder="Project Title"> 
    <div class="file-upload">
      <label for="fileInput">Project Image</label>
      <input type="file" (change)="onFileChange($event)" id="fileInput">
    </div>
    <textarea rows="2" formControlName="description" placeholder="Project Description"></textarea>
    <input type="text" formControlName="liveDemo" placeholder="Live Demo URL">
    <input type="text" formControlName="sourceCode" placeholder="Source Code URL">
    
    <div formArrayName="tech">
      <div *ngFor="let tec of tech.controls; let i =index">
    <input type="text" [formControlName]="i" placeholder="Tech Stack ">
  </div>
  
</div>
<button type="button" class="btn-primary" (click)="addTech()">+Tech</button>  
</div>

<button class="btn ghost">
  {{ editingId ? 'Update Project' : '+ Add Project' }}
</button>
  </form>
  <div class="projects-list">
  <div class="project-card" *ngFor="let project of projects">

    <img 
      [src]="project.image"
      width="120"
    >

    <div>
      <h4>{{ project.title }}</h4>
      <p>{{ project.description }}</p>

      <button class="btn-primary" (click)="editProject(project)">
        Edit
      </button>

      <button class="btn-danger" (click)="deleteProject(project._id)">
        Delete
      </button>
    </div>

  </div>
</div>
</section>
